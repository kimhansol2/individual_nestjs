name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # 환경 변수를 Job 레벨에서 설정
    env:
      NODE_ENV: test
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js and Cache Dependencies
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm' # Node.js 패키지 매니저(npm) 캐싱을 사용

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Test Coverage
        run: npm run test:cov